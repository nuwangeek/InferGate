services:

  # ── Mock vLLM ────────────────────────────────────────────────────────────────
  # Mimics the real vLLM OpenAI-compatible API without requiring a GPU.
  # The API container calls it via http://vllm:8000 (Docker internal DNS).
  #
  # To use the REAL vLLM on a CUDA-enabled Linux host, replace this block with:
  #
  #   vllm:
  #     image: vllm/vllm-openai:latest
  #     runtime: nvidia
  #     environment:
  #       HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN}
  #     command: --model Qwen/Qwen2.5-0.5B-Instruct --port 8000
  #     volumes:
  #       - ~/.cache/huggingface:/root/.cache/huggingface
  #     ports:
  #       - "8001:8000"
  # ─────────────────────────────────────────────────────────────────────────────
  vllm:
    build:
      context: ./mock_vllm
    healthcheck:
      # Python stdlib — no curl/wget needed in the slim image.
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── API gateway ───────────────────────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      VLLM_BASE_URL: http://vllm:8000
      VLLM_MODEL: mock-model
    depends_on:
      vllm:
        condition: service_healthy  # wait until vllm passes its healthcheck
